<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tài khoản - MobiFarm CTV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="../assets/css/shared-global-stylesheet-foundation.css"
    />
    <link
      rel="stylesheet"
      href="../assets/css/account-profile-management-styles.css"
    />
  </head>
  <body>
    <main class="account-page">
      <div class="account-cover"></div>

      <section class="profile-card">
        <img
          class="avatar"
          src="https://images.unsplash.com/photo-1615109398623-88346a601842?auto=format&fit=crop&w=180&q=80"
          alt="Ảnh đại diện"
        />
        <strong id="accountName">{Họ và tên}</strong>
      </section>

      <section class="panel">
        <h2>Tài khoản</h2>
        <a class="row-btn" href="./account-profile-personal-info.html">
          <i class="fa-regular fa-circle-user"></i>
          <span>Thông tin cá nhân</span>
        </a>
      </section>

      <section class="panel">
        <h2>Thông tin chung</h2>
        <a class="row-btn" href="./faq-help-center.html">
          <i class="fa-regular fa-circle-question"></i>
          <span>Câu hỏi thường gặp</span>
        </a>
        <a class="row-btn" href="./promotion-platform-management.html">
          <i class="fa-regular fa-handshake"></i>
          <span>Nền tảng quảng bá</span>
        </a>
        <a class="row-btn" href="./terms-and-service-policy.html">
          <i class="fa-regular fa-clipboard"></i>
          <span>Điều khoản & Dịch vụ</span>
        </a>
      </section>

      <button class="logout-btn" id="logoutBtn" type="button">
        <i class="fa-solid fa-arrow-right-from-bracket"></i>
        <span>Đăng xuất</span>
      </button>
    </main>

    <nav class="mobile-nav" id="mobileNav">
      <a href="./sales-affiliate-dashboard-overview.html" data-tab="home">
        <span class="nav-ico"><i class="fa-regular fa-house"></i></span>
        <span class="nav-label">Trang chủ</span>
      </a>
      <a
        href="./revenue-performance-analytics-dashboard.html"
        data-tab="customers"
      >
        <span class="nav-ico">
          <i class="fa-regular fa-credit-card"></i>
          <span class="nav-badge">17</span>
        </span>
        <span class="nav-label">Doanh thu</span>
      </a>
      <a href="./order-fulfillment-tracking-center.html" data-tab="orders">
        <span class="nav-ico"><i class="fa-regular fa-file-lines"></i></span>
        <span class="nav-label">Đơn hàng</span>
      </a>
      <a
        class="active"
        href="./account-profile-management-center.html"
        data-tab="account"
      >
        <span class="nav-ico"><i class="fa-regular fa-user"></i></span>
        <span class="nav-label">Tài khoản</span>
      </a>
    </nav>

    <div class="toast" id="toast"></div>

    <script src="../assets/scripts/shared-application-utilities.js"></script>
    <script src="../assets/scripts/account-profile-management/page-state-data-store.js"></script>
    <script src="../assets/scripts/account-profile-management/backend-api-client.js"></script>
    <script src="../assets/scripts/account-profile-management/business-logic-service.js"></script>
    <script src="../assets/scripts/account-profile-management/ui-renderer-view.js"></script>
    <script src="../assets/scripts/account-profile-management/user-event-handlers.js"></script>
    <script src="../assets/scripts/account-profile-management/page-module-bootstrap.js"></script>
  </body>
</html>
