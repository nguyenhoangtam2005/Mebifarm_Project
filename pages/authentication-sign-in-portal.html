<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập CTV - Mobi Farm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="../assets/css/shared-global-stylesheet-foundation.css"
    />
    <link
      rel="stylesheet"
      href="../assets/css/authentication-sign-in-page-styles.css"
    />
  </head>
  <body>
    <main class="login-page">
      <section class="login-card" aria-label="Đăng nhập cộng tác viên">
        <div class="brand-wrap">
          <img
            src="../assets/img/brand-mobifarm-primary-logo-mark.png"
            alt=""
          />
        </div>

        <h1>Đăng nhập</h1>

        <form id="loginForm" novalidate>
          <label for="usernameInput">Tên đăng nhập<span>*</span></label>
          <div class="field-wrap" id="usernameField">
            <i class="fa-regular fa-user"></i>
            <input
              id="usernameInput"
              type="text"
              autocomplete="username"
              placeholder="Nhập tên đăng nhập"
            />
          </div>
          <p class="field-error" id="usernameError"></p>

          <div class="label-row">
            <label for="passwordInput">Mật khẩu<span>*</span></label>
            <a href="#" id="forgotPasswordLink">Quên mật khẩu?</a>
          </div>
          <div class="field-wrap" id="passwordField">
            <i class="fa-regular fa-align-justify"></i>
            <input
              id="passwordInput"
              type="password"
              autocomplete="current-password"
              placeholder="Nhập mật khẩu"
            />
            <button
              class="eye-btn"
              id="togglePasswordBtn"
              type="button"
              aria-label="Hiện mật khẩu"
            >
              <i class="fa-regular fa-eye-slash"></i>
            </button>
          </div>
          <p class="field-error" id="passwordError"></p>

          <button class="submit-btn" id="submitLoginBtn" type="submit">
            Đăng nhập
          </button>
        </form>

        <p class="register-text" aria-hidden="true"></p>
      </section>
    </main>

    <div class="toast" id="toast"></div>

    <script src="../assets/scripts/shared-application-utilities.js"></script>
    <script src="../assets/scripts/authentication-login/page-state-data-store.js"></script>
    <script src="../assets/scripts/authentication-login/backend-api-client.js"></script>
    <script src="../assets/scripts/authentication-login/business-logic-service.js"></script>
    <script src="../assets/scripts/authentication-login/ui-renderer-view.js"></script>
    <script src="../assets/scripts/authentication-login/user-event-handlers.js"></script>
    <script src="../assets/scripts/authentication-login/page-module-bootstrap.js"></script>
  </body>
</html>
